<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manutenzioni Auto</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-512.png">
  <link rel="stylesheet" href="style.css">

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>
</head>

<body>
  <header>
    <h1>Manutenzioni Auto</h1>
    <p>Registra interventi, costi e chilometraggio — tutto salvato in locale.</p>
  </header>

  <main class="layout">
    <!-- Colonna sinistra -->
    <section class="card left">
      <h2>Nuovo intervento</h2>

      <label for="tipo">Tipo intervento</label>
      <input id="tipo" type="text" placeholder="Tagliando" />

      <label for="data">Data intervento</label>
      <input id="data" type="date" />

      <label for="km">Km</label>
      <input id="km" type="number" placeholder="Es. 12345" />

      <label for="ricambi">Costo ricambi (€)</label>
      <input id="ricambi" type="number" step="0.01" placeholder="0.00" />

      <label for="manodopera">Costo manodopera (€)</label>
      <input id="manodopera" type="number" step="0.01" placeholder="0.00" />

      <label for="titolo">Titolo breve</label>
      <input id="titolo" type="text" placeholder="Es. Sostituzione pastiglie anteriori" />

      <label for="note">Note dettagliate</label>
      <textarea id="note" placeholder="Annotazioni, riferimento fattura, officina..."></textarea>

      <div class="buttons-row">
        <button onclick="salva()">Salva intervento</button>
        <button class="secondary" onclick="nuovo()">Nuovo</button>
        <button class="secondary" onclick="svuotaTutto()">Svuota tutto</button>
      </div>

      <p class="status">
        <span id="stato">Pronto</span> ·
        Ultimo salvataggio: <span id="ultimo-salvataggio">—</span>
      </p>
    </section>

    <!-- Colonna destra -->
    <section class="card right">
      <div class="storico-header">
        <h2>Storico interventi</h2>
        <span id="conteggio">0 interventi</span>
      </div>

      <div class="totale-box">
        <div>Totale speso</div>
        <div class="totale-importo">€<span id="totale-speso">0.00</span></div>
        <small>Aggiornato automaticamente</small>
      </div>

      <ul id="lista" class="lista-interventi"></ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
